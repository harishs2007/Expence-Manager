<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Expense Tracker</title>
</head>
<body>
    <header>
        <img>
        <h1>My Expense Tracker</h1>
    </header>
    <section class="summary">
     <div class="card income-card">
        <img>
        <div>
            <p>Total Income</p>
            <h2 id="totalIncome">₹0</h2>
        </div>
     </div>
     <div class="card expense-card">
        <img>
        <div>
            <p>Total Expense</p>
            <h2 id="totalExpense">₹0</h2>
        </div>
     </div>
     <div class="card balance-card">
        <img src="" alt="">
        <div>
            <p>Balance</p>
            <h2 id="balance">₹0</h2>
        </div>
     </div>
    </section>
    <div class="main-content">
        <section class="form-box">
            <h3>Add New Transaction</h3>
            <form id="transactionForm">
             <label for="title">Title</label>
             <input type="text" id="title" placeholder="Eg: Bus fare, Salary..." required>   
             <label for="amount">Amount</label>
             <input type="number" id="amount" placeholder="Enter amount" required>
             <label for="type">Type</label>
             <select id="type">
                <option value="income">Income</option>
                <option value="expense"></option>
             </select>
             <label for="category">Category</label>
             <select id="category">
                <option>Food</option>
                <option>Travel</option>
                <option>Shopping</option>
                <option>Bills</option>
                <option>Study</option>
                <option>Fun</option>
                <option>Other</option>
             </select>
             <label for="date">Date</label>
             <input type="date" id="date" required>
             <button type="submit">Add Transaction</button>
            </form>
        </section>
        <section class="chart-box">
            <h3>Expenses by Category</h3>
            <canvas id="myChart" width="250" height="250"></canvas>
            <ul id="chartLegend"></ul>
        </section>
    </div>
    <section class="history-box">
        <h3>Transaction History</h3>
        <input type="text" id="searchInput" placeholder="Search transaction...">
        <table id="transactionTable">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="transactionBody">
             
            </tbody>
        </table>
        <p id="noDataMsg">No transactions added yet.</p>
            <button id="clearBtn">Clear All Data</button>
    </section>

    <footer>
        <p>Made with HTML, CSS and JavaScript</p>
    </footer>

    <script src="storage.js"></script>
</body>
</html>
